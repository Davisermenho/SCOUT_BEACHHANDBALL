teste_de_competencia:
  id: TC-PAPEL-REGULAMENTAR-001
  conceito_testado: Papel_Regulamentar
  escopo: CONCEPT-DIMENSOES-001-TESTS
  fonte_de_autoridade: FICHA_CONCEITUAL_PAPEL_REGULAMENTAR.yaml
  fontes_complementares:
    - DH-PAPEIS-001 (respostas 2, 5, 9)
  status: TESTE_DE_COMPETENCIA_CRIADO_AGUARDANDO_EXECUCAO_E_VALIDACAO

  casos:
    - id: TC-PAPREG-001-C1
      descricao: "Papel_Regulamentar permanece estatuto jurídico fixo e não deve ser confundido com Papel_Tático, mesmo quando se articulam."
      entrada:
        papel_tatico: Especialista
        papel_regulamentar_de_base: Jogador_De_Linha
      esperado:
        papel_regulamentar_final: Jogador_De_Linha
        inferencia_proibida:
          - Confundir Papel_Regulamentar com Papel_Tático
          - Inferir que Especialista possui Papel_Regulamentar distinto de Jogador_De_Linha ou Goleiro
      fonte: DH-PAPEIS-001 (respostas 2 e 5)

    - id: TC-PAPREG-001-C2
      descricao: "Substituição Jogador_de_Linha → Goleira é proibida fora da regra restrita Especialista↔Goleira."
      entrada:
        substituicao:
          atleta_saindo: Jogador_De_Linha
          atleta_entrando: Goleira
      esperado:
        substituicao_valida: false
        inferencia_proibida:
          - Permitir troca Jogador_de_Linha → Goleira fora da regra restrita Especialista↔Goleira
      fonte: DH-PAPEIS-001 (resposta 9)

    - id: TC-PAPREG-001-C3
      descricao: "Substituição restrita Especialista↔Goleira é válida quando a Goleira sai da quadra."
      entrada:
        substituicao:
          atleta_entrando: Especialista
          atleta_saindo: Goleira
          goleira_sai_da_quadra: true
      esperado:
        substituicao_valida: true
      fonte: DH-PAPEIS-001 (resposta 2)

    - id: TC-PAPREG-001-C4
      descricao: "A definição regulamentar completa de Papel_Regulamentar não é completada por inferência a partir de regra IHF não reprocessada."
      entrada:
        consulta: definicao_completa_de_Papel_Regulamentar
      esperado:
        status: PENDENTE_DEFINICAO_LITERAL
        motivo: depende_de_Regras_1_18_ainda_nao_reprocessadas
        inferencia_proibida:
          - Completar a definição regulamentar completa de Papel_Regulamentar por inferência a partir de Regras 1–18 não consultadas nesta etapa
      fonte: FICHA_CONCEITUAL_PAPEL_REGULAMENTAR.yaml (pendencias_controladas)

  bloqueios_obrigatorios:
    - "Gol de giro (360º) e Gol aéreo não são resolvidos por este teste."
    - "O cruzamento com R09-CAT-2026-06-18 permanece bloqueado; não avaliado por este teste."
    - "Nenhuma categoria de pontuação é alterada por este teste."
    - "Jogador_De_Linha é usado apenas como categoria regulamentar citada; permanece PENDENTE_DEFINICAO_LITERAL e não constitui ficha própria criada por este teste."
    - "Status_Operacional e Status_Regulamentar, quando mencionados, permanecem conceitos candidatos não promovidos."

  gates_pendentes:
    - execução efetiva dos 4 casos de teste
    - validação humana dos resultados
    - validação lógica ou estrutural

  observacoes:
    - Este teste cobre exclusivamente Papel_Regulamentar, conforme escopo de CONCEPT-DIMENSOES-001-TESTS.
    - Não altera FICHA_CONCEITUAL_PAPEL_REGULAMENTAR.yaml, DH-PAPEIS-001.md ou DH-PAPEIS-001_CLARIFICACAO_Q8.md.
    - Não altera Regras 1-18, Apêndices, DH-ESP-001 ou a ontologia principal.
    - Não reconstrói a definição regulamentar completa pela regra oficial IHF.
    - Os casos descrevem entrada/esperado; a execução efetiva (rodar o teste contra uma implementação) não é realizada por este registro.
