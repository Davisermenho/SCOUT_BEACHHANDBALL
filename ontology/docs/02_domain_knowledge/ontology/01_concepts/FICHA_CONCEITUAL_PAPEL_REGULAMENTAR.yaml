ficha_conceitual:
  id: FC-PAPEL-REGULAMENTAR-001
  conceito: Papel_Regulamentar
  nome_canonico: Papel_Regulamentar
  escopo: CONCEPT-DIMENSOES-001
  status: CONSOLIDACAO_SEMANTICA_AUTORIZADA
  nao_herda_validacao_anterior: true
  fonte_de_autoridade: DH-PAPEIS-001

  evidencias_de_consolidacao_semantica:
    decisao_humana_base:
      - DH-PAPEIS-001.md
      - DH-PAPEIS-001_CLARIFICACAO_Q8.md
      - DH-DIMENSOES-001_HUMAN_VALIDATION.md
    auditorias:
      - DH-PAPEIS-001_SEMANTIC_AUDIT_REPORT.md
      - CONCEPT-DIMENSOES-001_VALIDATION_REPORT.md
      - CONCEPT-DIMENSOES-001_TESTS_VALIDATION_REPORT.md
      - CONCEPT-DIMENSOES-001_TESTS_EXECUTION_REPORT.md
      - DH-DIMENSOES-001_HUMAN_VALIDATION_AUDIT_REPORT.md
    resultado_testes_logicos:
      casos_executados: 15
      casos_aprovados: 15
      casos_reprovados: 0
      tipo_execucao: logica_manual
    validacao_humana:
      status: validada_literalmente
      autorizacao: CONSOLIDACAO_SEMANTICA_AUTORIZADA

  limites_da_consolidacao:
    - Esta consolidação é semântica.
    - Não é validação de implementação real.
    - Não autoriza VALIDADO_TOTAL.
    - Não autoriza CONSOLIDADO_VALIDO final.
    - Não resolve Gol de giro / Gol aéreo.
    - Não resolve cruzamento com R09-CAT-2026-06-18.
    - Não altera categoria de pontuação.
    - Não promove conceitos candidatos.
    - Não gera ontologia principal.

  definicao_literal: >
    É o Estatuto Jurídico Fixo determinado pelo livro de regras da IHF:
    Jogador de Linha ou Goleiro. No handebol de areia, a regra de
    substituição do Especialista é restrita e absoluta: ela só pode trocar
    de lugar com a goleira, que deve sair da quadra para a sua entrada. Para
    os demais, o estatuto regulamentar é de Jogador de Linha, divididos de
    forma estrita pela fase do jogo através de uma troca integral
    (defensoras atuam restritas à área da própria goleira; atacantes atuam
    restritas à área da goleira adversária).
  fonte_da_definicao: DH-PAPEIS-001 (resposta 2)

  afirmacoes:
    - id: FC-PAPREG-001-01
      sujeito: Papel_Regulamentar
      predicado: determinado_por
      objeto: livro_de_regras_da_IHF
      fonte: DH-PAPEIS-001 (resposta 2)
    - id: FC-PAPREG-001-02
      sujeito: Papel_Regulamentar
      predicado: distinto_mas_se_articula_com
      objeto: Papel_Tático
      fonte: DH-PAPEIS-001 (resposta 5)
    - id: FC-PAPREG-001-03
      sujeito: substituição_do_Especialista
      predicado: é_restrita_a
      objeto: troca_com_a_goleira
      fonte: DH-PAPEIS-001 (resposta 2)

  escopo_da_definicao: >
    Cobre exclusivamente a dicotomia Jogador de Linha / Goleiro e a regra
    restrita de substituição do Especialista, conforme literalmente
    declarado em DH-PAPEIS-001 (respostas 2, 5, 9). Não reconstrói a
    definição regulamentar completa pela regra oficial IHF (Regras 1–18 não
    consultadas nesta etapa) e não é definição extensional completa de
    Papel_Regulamentar.

  relacoes_declaradas:
    - "Papel_Tático e Papel_Regulamentar são distintos, mas se articulam: no ataque, o Especialista funde os dois — o treinador escolhe o papel tático (quem veste o colete) e esse artefato ativa o direito regulamentar automático de que o gol marcado por ela vale 2 pontos (DH-PAPEIS-001, resposta 5)."
    - "Nas trocas de linha normais, as atletas têm o mesmo Papel_Regulamentar (Jogador de Linha), mas desempenham Papéis_Táticos opostos (DH-PAPEIS-001, resposta 5)."

  nao_equivalencias:
    - Papel_Regulamentar não deve ser confundido com Papel_Tático, mesmo quando se articulam no caso do Especialista (DH-PAPEIS-001, resposta 5).

  inferencias_proibidas:
    - "Não permitir troca Jogador_de_Linha → Goleira fora da regra restrita de substituição (DH-PAPEIS-001, resposta 9: PROIBIR Atleta_Saindo = Jogador_de_Linha AND Atleta_Entrando = Goleira)."
    - "Não completar a definição regulamentar completa de Papel_Regulamentar por inferência a partir de regra IHF ainda não reprocessada."
    - Não confundir Papel_Regulamentar com Papel_Tático.

  exemplos:
    - "Jogador de Linha e Goleiro/Goleira como as duas categorias regulamentares citadas (DH-PAPEIS-001, resposta 2)."
    - "Regra de substituição restrita do Especialista: só pode trocar de lugar com a goleira, que deve sair da quadra (DH-PAPEIS-001, resposta 2)."

  contraexemplos:
    - "Substituição com Atleta_Saindo = Jogador_de_Linha AND Atleta_Entrando = Goleira é proibida fora da regra restrita Especialista↔Goleira (DH-PAPEIS-001, resposta 9)."

  conceitos_relacionados:
    - Papel_Tático
    - Especialista
    - Goleiro
    - Jogador_De_Linha

  conceitos_candidatos_nao_promovidos:
    - Jogador_De_Linha (permanece PENDENTE_DEFINICAO_LITERAL desde VOCAB-MIN-001; DH-PAPEIS-001 resposta 2 acrescenta contexto, mas não fornece definição extensional própria)
    - Status_Operacional
    - Status_Regulamentar

  pendencias_controladas:
    - Definição regulamentar completa de Papel_Regulamentar depende de regras oficiais IHF ainda não reprocessadas; Regras 1–18 não foram consultadas nesta etapa.
    - Jogador_De_Linha permanece PENDENTE_DEFINICAO_LITERAL.
    - validação humana desta ficha
    - teste de competência (a ser criado em etapa futura)
    - validação lógica ou estrutural

  bloqueio_obrigatorio:
    - Gol de giro (360º) e Gol aéreo permanecem bloqueados; não resolvidos nesta ficha.
    - O cruzamento com R09-CAT-2026-06-18 não foi resolvido nesta etapa.
    - Nenhuma categoria de pontuação foi alterada por esta ficha.

  observacoes:
    - Esta ficha cobre exclusivamente Papel_Regulamentar, conforme escopo de CONCEPT-DIMENSOES-001.
    - Não altera Regras 1-18, Apêndices, DH-ESP-001, DH-PAPEIS-001.md ou DH-PAPEIS-001_CLARIFICACAO_Q8.md.
    - Não reconstrói a definição regulamentar completa pela regra oficial IHF.
    - Não reinterpreta DH-PAPEIS-001; reproduz literalmente as decisões nele registradas.
    - Não constitui taxonomia ou ontologia.
