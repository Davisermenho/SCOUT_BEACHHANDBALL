name: Validate Document Governance

"on":
  push:
    paths:
      - "docs/**"
      - "scripts/validate_document_governance.py"
      - "tests/test_validate_document_governance.py"
      - ".github/workflows/validate-document-governance.yml"
      - ".gitattributes"
  pull_request:
    paths:
      - "docs/**"
      - "scripts/validate_document_governance.py"
      - "tests/test_validate_document_governance.py"
      - ".github/workflows/validate-document-governance.yml"
      - ".gitattributes"

jobs:
  validate-document-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test and validator dependencies
        run: python -m pip install --disable-pip-version-check pyyaml pytest

      - name: Run document governance validator
        run: python scripts/validate_document_governance.py

      - name: Run document governance test suite
        run: pytest -q tests/test_validate_document_governance.py
